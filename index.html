<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OnlyLemons — Portfolio</title>
  <link rel="preload" as="image" href="assets/background.png">
  <link rel="preload" as="image" href="assets/imagetitle.png">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Intro full-screen GIF -->
  <div id="intro" class="intro">
    <img src="assets/gifintro.gif" alt="Intro" />
  </div>

  <!-- Top-right social text links (hidden on scroll) -->
  <div id="social" class="social">
    <a href="https://x.com/OnlyLemons_" target="_blank" rel="noopener">X</a>
    <a href="https://discord.gg/GEXHNXQ6X2" target="_blank" rel="noopener">Discord</a>
  </div>

  <!-- Floating small GIF (appears only near top) -->
  <img id="bee" class="bee" src="assets/lemonbee.gif" alt="floating gif" />

  <!-- HERO / top section -->
  <section id="hero" class="hero">
    <div id="large-tile" class="large-tile">
      <img src="assets/imagetitle.png" alt="Portfolio title" />
    </div>
  </section>

  <!-- GRID section -->
  <section class="grid-section">
    <div class="grid">
      <div class="tile" data-delay="0"><img src="assets/athletic_lemon.gif" alt="tile 1" /></div>
      <div class="tile" data-delay="200"><img src="assets/sugar_rush_dino.gif" alt="tile 2" /></div>
      <div class="tile" data-delay="400"><img src="assets/undead.gif" alt="tile 3" /></div>
      <div class="tile" data-delay="600"><img src="assets/wizard_cat2.gif" alt="tile 4" /></div>
      <div class="tile" data-delay="800"><img src="assets/eeee.gif" alt="tile 5" /></div>
      <div class="tile" data-delay="100"></div>
      <div class="tile" data-delay="150"></div>
      <div class="tile" data-delay="200"></div>
      <div class="tile" data-delay="250"></div>
      <div class="tile" data-delay="300"></div>
      <div class="tile" data-delay="350"></div>
      <div class="tile" data-delay="400"></div>
      <div class="tile" data-delay="450"></div>
      <div class="tile" data-delay="500"></div>
      <div class="tile" data-delay="550"></div>
      <div class="tile" data-delay="600"></div>
      <div class="tile" data-delay="650"></div>
      <div class="tile" data-delay="100"></div>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
