<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Portfolio</title>
    <!-- Tailwind via CDN (niente build necessaria) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Smooth hover scaling for tiles */
      .tile { transition: transform .25s ease, box-shadow .25s ease; }
      .tile:hover { transform: scale(1.05); box-shadow: 0 20px 40px rgba(0,0,0,.25); }
      .aspect-16-6 { position: relative; width: 100%; }
      .aspect-16-6::before { content: ""; display: block; padding-top: calc(100% * 6 / 16); }
      .aspect-4-3 { position: relative; width: 100%; }
      .aspect-4-3::before { content: ""; display: block; padding-top: calc(100% * 3 / 4); }
      .fill-abs > * { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
    </style>
  </head>
  <body class="text-neutral-900 antialiased">
    <!-- Zona superiore con sfondo azzurro (sostituito da PNG) -->
    <section class="px-4 sm:px-6 pt-16 sm:pt-24 pb-24"
             style="background-image:url('assets/background.png'); background-size:cover; background-position:center;">
      <div class="max-w-6xl mx-auto">
        <!-- Riquadro grande non scalabile -->
        <div class="aspect-16-6 bg-black rounded-2xl shadow-md"></div>
      </div>
    </section>

    <!-- Zona immagini con sfondo grigio -->
    <section class="bg-neutral-100 px-4 sm:px-6 py-24">
      <div class="max-w-6xl mx-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
        <!-- Primo riquadro con GIF -->
        <div class="tile rounded-2xl overflow-hidden shadow-sm">
          <div class="aspect-4-3 fill-abs">
            <img src="assets/lemon.gif" alt="Portfolio GIF">
          </div>
        </div>

        <!-- Altri riquadri neri simmetrici -->
        <div class="tile rounded-2xl overflow-hidden shadow-sm"><div class="aspect-4-3 bg-black"></div></div><div class="tile rounded-2xl overflow-hidden shadow-sm"><div class="aspect-4-3 bg-black"></div></div><div class="tile rounded-2xl overflow-hidden shadow-sm"><div class="aspect-4-3 bg-black"></div></div><div class="tile rounded-2xl overflow-hidden shadow-sm"><div class="aspect-4-3 bg-black"></div></div><div class="tile rounded-2xl overflow-hidden shadow-sm"><div class="aspect-4-3 bg-black"></div></div><div class="tile rounded-2xl overflow-hidden shadow-sm"><div class="aspect-4-3 bg-black"></div></div><div class="tile rounded-2xl overflow-hidden shadow-sm"><div class="aspect-4-3 bg-black"></div></div><div class="tile rounded-2xl overflow-hidden shadow-sm"><div class="aspect-4-3 bg-black"></div></div><div class="tile rounded-2xl overflow-hidden shadow-sm"><div class="aspect-4-3 bg-black"></div></div><div class="tile rounded-2xl overflow-hidden shadow-sm"><div class="aspect-4-3 bg-black"></div></div><div class="tile rounded-2xl overflow-hidden shadow-sm"><div class="aspect-4-3 bg-black"></div></div><div class="tile rounded-2xl overflow-hidden shadow-sm"><div class="aspect-4-3 bg-black"></div></div><div class="tile rounded-2xl overflow-hidden shadow-sm"><div class="aspect-4-3 bg-black"></div></div><div class="tile rounded-2xl overflow-hidden shadow-sm"><div class="aspect-4-3 bg-black"></div></div><div class="tile rounded-2xl overflow-hidden shadow-sm"><div class="aspect-4-3 bg-black"></div></div><div class="tile rounded-2xl overflow-hidden shadow-sm"><div class="aspect-4-3 bg-black"></div></div><div class="tile rounded-2xl overflow-hidden shadow-sm"><div class="aspect-4-3 bg-black"></div></div>
      </div>
    </section>
  </body>
</html>
